<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="田中せいじ 活動写真プレースホルダー">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef7f1"/>
      <stop offset="100%" stop-color="#dff0e6"/>
    </linearGradient>
    <linearGradient id="figure" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1aa15c"/>
      <stop offset="100%" stop-color="#005a31"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a93a"/>
      <stop offset="100%" stop-color="#d18a18"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg2)"/>
  <!-- ground line -->
  <rect x="0" y="500" width="600" height="100" fill="#fff" opacity="0.5"/>
  <!-- accent stripe (representing campaign tasuki) -->
  <path d="M 230 200 L 270 200 L 380 500 L 340 500 Z" fill="url(#accent)" opacity="0.85"/>
  <!-- body -->
  <path d="M 220 280 Q 220 240 270 235 L 330 235 Q 380 240 380 280 L 380 500 L 220 500 Z" fill="url(#figure)" opacity="0.9"/>
  <!-- head -->
  <circle cx="300" cy="200" r="55" fill="url(#figure)" opacity="0.95"/>
  <!-- raised hand -->
  <path d="M 380 340 Q 430 320 440 270 L 450 270 Q 445 330 395 365 Z" fill="url(#figure)" opacity="0.85"/>
  <g font-family="'Noto Serif JP', 'Yu Mincho', serif" text-anchor="middle">
    <text x="300" y="555" font-size="14" fill="#005a31" opacity="0.7" letter-spacing="6">ACTIVITY PHOTO PLACEHOLDER</text>
    <text x="300" y="578" font-size="11" fill="#005a31" opacity="0.55" letter-spacing="3">assets/profile.jpg に差し替えてください</text>
  </g>
</svg>
