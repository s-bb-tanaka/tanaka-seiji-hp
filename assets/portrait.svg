<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="田中せいじ プロフィール写真プレースホルダー">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef7f1"/>
      <stop offset="100%" stop-color="#f4f1e8"/>
    </linearGradient>
    <linearGradient id="silhouette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a8049"/>
      <stop offset="100%" stop-color="#006a3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#f0a93a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f0a93a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <rect width="400" height="500" fill="url(#glow)"/>
  <!-- Shoulders -->
  <path d="M 50 500 Q 50 360 200 350 Q 350 360 350 500 Z" fill="url(#silhouette)" opacity="0.85"/>
  <!-- Head -->
  <circle cx="200" cy="220" r="78" fill="url(#silhouette)" opacity="0.9"/>
  <!-- Watermark text -->
  <g font-family="'Noto Serif JP', 'Yu Mincho', serif" text-anchor="middle">
    <text x="200" y="450" font-size="14" fill="#fff" opacity="0.9" letter-spacing="6">PORTRAIT PLACEHOLDER</text>
    <text x="200" y="472" font-size="11" fill="#fff" opacity="0.7" letter-spacing="3">assets/portrait.jpg に差し替えてください</text>
  </g>
</svg>
